<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Surat Untuk Kamu 💌</title>

<style>
body {
  margin: 0;
  font-family: 'Georgia', serif;
  background: #fbeec1;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Amplop */
.envelope {
  width: 300px;
  height: 200px;
  background: #ff6f91;
  position: relative;
  cursor: pointer;
  border-radius: 10px;
}

.envelope::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: #ff8fab;
  clip-path: polygon(0 0, 50% 50%, 100% 0);
}

.text-open {
  position: absolute;
  width: 100%;
  text-align: center;
  top: 80px;
  color: white;
  font-weight: bold;
}

/* Surat */
.surat {
  display: none;
  background: white;
  padding: 30px;
  width: 80%;
  max-width: 600px;
  border-radius: 15px;
  box-shadow: 0 0 20px rgba(0,0,0,0.2);
}

.ttd {
  margin-top: 20px;
  text-align: right;
  font-style: italic;
}
</style>
</head>

<body>

<!-- Musik -->
<audio id="musik" autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3">
</audio>

<!-- Amplop -->
<div class="envelope" onclick="bukaSurat()" id="amplop">
  <div class="text-open">Klik untuk buka 💌</div>
</div>

<!-- Surat -->
<div class="surat" id="surat">
  <h2 id="judul"></h2>
  <p id="isi"></p>
  <div class="ttd" id="ttd"></div>
</div>

<script>
function bukaSurat() {
  document.getElementById("amplop").style.display = "none";
  document.getElementById("surat").style.display = "block";

  ketikJudul("💌 for my mom 💌", 0);
}

/* Efek ketik */
function ketikJudul(text, i) {
  if (i < text.length) {
    document.getElementById("judul").innerHTML += text.charAt(i);
    setTimeout(() => ketikJudul(text, i + 1), 80);
  } else {
    ketikIsi();
  }
}

function ketikIsi() {
  let text = `hii mom, wanita tercantik no 1 didunia

Barakallah fii umrik 🎉  
Semoga mak selalu bahagia, sehat dipanjangkan umurnya, 

dilimpahkan selalu dan dipermudah selalu rezekinya dan tercapai semua impiann.

Terima kasih sudah jadi orang tua yang baik buat vian. 💖

Maaf tahun ini belum bisa ngasi apa apa :)

Jangan lupa tersenyum hari ini 😆🎂`;

  let i = 0;
  function typing() {
    if (i < text.length) {
      document.getElementById("isi").innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, 40);
    } else {
      ketikTtd();
    }
  }
  typing();
}

function ketikTtd() {
  let text = "Dari: (Nama Kamu 🤍)";
  let i = 0;
  function typing() {
    if (i < text.length) {
      document.getElementById("ttd").innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, 60);
    }
  }
  typing();
}
</script>

</body>
</html>
